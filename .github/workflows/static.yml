<script>
// ============================================================
// INITIALIZE DASHBOARD
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderKPIs();
  renderGroupedBar();
  renderDonut();
  renderTimeline();
  renderArea();
  renderVariance();
  renderHeatmap();
  renderHorizontalBar();
  renderStacked();
  renderWaterfall();
  renderCalHeatmap();
  renderGauges();
  renderDGPGStock();
  renderSCommSTL();
  renderPlanningTable();
  renderAlerts();
  renderAIInsights();
});

// ============================================================
// FILTER LOGIC
// ============================================================
function toggleFilter(type, val, el) {
  if (type === 'rio') {
    const idx = filters.rios.indexOf(val);
    if (idx > -1) { if (filters.rios.length > 1) { filters.rios.splice(idx, 1); el.classList.remove('active'); } }
    else { filters.rios.push(val); el.classList.add('active'); }
  } else if (type === 'sc') {
    const idx = filters.scommStl.indexOf(val);
    if (idx > -1) { if (filters.scommStl.length > 1) { filters.scommStl.splice(idx, 1); el.classList.remove('active'); } }
    else { filters.scommStl.push(val); el.classList.add('active'); }
  } else if (type === 'fuel') {
    const idx = filters.dgpg.indexOf(val);
    if (idx > -1) { if (filters.dgpg.length > 1) { filters.dgpg.splice(idx, 1); el.classList.remove('active'); } }
    else { filters.dgpg.push(val); el.classList.add('active'); }
  }
  refreshAllCharts();
}

function setView(v, el) {
  filters.view = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  refreshAllCharts();
}

function refreshAllCharts() {
  Object.values(chartRefs).forEach(c => { if (c) c.destroy(); });
  renderKPIs();
  renderGroupedBar();
  renderDonut();
  renderTimeline();
  renderArea();
  renderVariance();
  renderHeatmap();
  renderHorizontalBar();
  renderStacked();
  renderWaterfall();
  renderCalHeatmap();
  renderGauges();
  renderDGPGStock();
  renderSCommSTL();
  renderPlanningTable();
  renderAlerts();
  renderAIInsights();
}

const chartRefs = {};

// ============================================================
// KPI CARDS
// ============================================================
function renderKPIs() {
  const filtered = getFilteredRIO();
  const rioKeys = Object.keys(filtered);
  const totalStock = rioKeys.reduce((s,k) => s + filtered[k].stock, 0);
  const totalReq = rioKeys.reduce((s,k) => s + filtered[k].req, 0);
  const totalPurchase = rioKeys.reduce((s,k) => s + filtered[k].purchase_16apr, 0);
  const totalUsage = rioKeys.reduce((s,k) => s + filtered[k].usage_16apr, 0);
  const avgDailyUsage = DB.aprilDailyData.reduce((s,d) => s+d.usage, 0) / DB.aprilDailyData.length;
  const coverageDays = totalStock / avgDailyUsage;
  const gap = totalStock - totalReq;
  const pctCovered = (totalStock / totalReq * 100).toFixed(1);
  const projectedShortfall = totalReq - totalStock;

  const cards = [
    { label:'Total Current Stock', val: fmt(totalStock) + ' L', sub:'All RIOs · 16-Apr', icon:'🛢️', cls:'status-blue', arrow:'', arrowType:'' },
    { label:'Total Purchased (16-Apr)', val: fmt(totalPurchase) + ' L', sub:'Today\'s procurement', icon:'⬆️', cls:'status-green', arrow:'↑ Active', arrowType:'up' },
    { label:'Total Consumed (16-Apr)', val: fmt(totalUsage) + ' L', sub:'Today\'s usage', icon:'🔥', cls:'status-amber', arrow:`Avg ${fmt(avgDailyUsage,0)} L/day`, arrowType:'warn' },
    { label:'Stock Coverage Days', val: Math.floor(coverageDays) + ' days', sub:'At current burn rate', icon:'📅', cls: coverageDays > 60 ? 'status-green' : coverageDays > 30 ? 'status-amber' : 'status-red', arrow: coverageDays > 60 ? '✓ Adequate' : coverageDays > 30 ? '⚠ Monitor' : '🔴 Critical', arrowType: coverageDays > 60 ? 'up' : 'down' },
    { label:'Stock vs Req Gap', val: fmt(Math.abs(gap)) + ' L', sub: `${pctCovered}% of requirement covered`, icon:'📉', cls:'status-red', arrow:`${gap < 0 ? '▼ Deficit' : '▲ Surplus'}`, arrowType: gap < 0 ? 'down' : 'up' },
    { label:'Projected Shortfall (Apr–Jun)', val: fmt(projectedShortfall) + ' L', sub:'Additional procurement needed', icon:'⚡', cls: projectedShortfall > 0 ? 'status-red' : 'status-green', arrow: projectedShortfall > 0 ? '🚨 Action Required' : '✓ Surplus', arrowType: projectedShortfall > 0 ? 'down' : 'up' }
  ];

  document.getElementById('kpi-grid').innerHTML = cards.map(c => `
    <div class="kpi-card ${c.cls}">
      <div class="kpi-icon">${c.icon}</div>
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value ${c.cls}">${c.val}</div>
      <div class="kpi-sub"><span class="kpi-arrow ${c.arrowType}">${c.arrow}</span> ${c.sub}</div>
    </div>
  `).join('');
}

// ============================================================
// CHART 1: GROUPED BAR
// ============================================================
function renderGroupedBar() {
  const ctx = document.getElementById('chart-grouped-bar').getContext('2d');
  const filtered = getFilteredRIO();
  const labels = Object.keys(filtered);
  const stocks = labels.map(k => filtered[k].stock);
  const reqs = labels.map(k => filtered[k].req);
  const usages = labels.map(k => filtered[k].usage_16apr);

  chartRefs['grouped-bar'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Current Stock', data: stocks, backgroundColor: 'rgba(59,130,246,0.7)', borderColor:'#3b82f6', borderWidth:1.5, borderRadius:4 },
        { label:'Apr–Jun Req', data: reqs, backgroundColor: 'rgba(245,158,11,0.7)', borderColor:'#f59e0b', borderWidth:1.5, borderRadius:4 },
        { label:'Usage (16-Apr)', data: usages, backgroundColor: 'rgba(239,68,68,0.7)', borderColor:'#ef4444', borderWidth:1.5, borderRadius:4 }
      ]
    },
    options: chartOpts('Litres')
  });
}

// ============================================================
// CHART 2: DONUT
// ============================================================
function renderDonut() {
  const ctx = document.getElementById('chart-donut').getContext('2d');
  const filtered = getFilteredRIO();
  const labels = Object.keys(filtered);
  const stocks = labels.map(k => filtered[k].stock);
  const colors = labels.map(k => filtered[k].color);

  chartRefs['donut'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: stocks, backgroundColor: colors, borderColor:'rgba(0,0,0,0.3)', borderWidth:2, hoverOffset:8 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position:'right', labels: { color:'#94a3b8', font:{ size:11 }, padding:12 }},
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${fmt(ctx.raw)} L (${pct(ctx.raw, ctx.dataset.data.reduce((a,b)=>a+b,0))}%)` }},
      },
      cutout: '65%'
    }
  });
}

// ============================================================
// CHART 3: TIMELINE (Line chart from dashboard image)
// ============================================================
function renderTimeline() {
  const ctx = document.getElementById('chart-timeline').getContext('2d');
  const allData = DB.allDaily;
  const labels = allData.map(d => d.day);
  
  chartRefs['timeline'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label:'Forecasted Req', data: allData.map(() => DB.aprMayJunReq),
          borderColor:'#94a3b8', borderDash:[6,4], pointRadius:0, borderWidth:1.5,
          fill:false, tension:0
        },
        {
          label:'Present Stock', data: allData.map(d => d.stock),
          borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.08)',
          pointRadius:3, borderWidth:2, fill:true, tension:0.3,
          pointBackgroundColor:'#3b82f6'
        },
        {
          label:'Daily Purchase', data: allData.map(d => d.purchase),
          borderColor:'#10b981', pointRadius:4, borderWidth:2, fill:false, tension:0.4,
          pointBackgroundColor:'#10b981', yAxisID:'y2'
        },
        {
          label:'Daily Usage', data: allData.map(d => d.usage),
          borderColor:'#ef4444', pointRadius:4, borderWidth:2, fill:false, tension:0.4,
          pointBackgroundColor:'#ef4444', yAxisID:'y2'
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { labels: { color:'#94a3b8', font:{size:11}, usePointStyle:true, pointStyleWidth:8 }},
        tooltip: { backgroundColor:'rgba(13,27,46,0.95)', titleColor:'#f8fafc', bodyColor:'#94a3b8', borderColor:'rgba(255,255,255,0.1)', borderWidth:1 }
      },
      scales: {
        x: { ticks: { color:'#64748b', font:{size:9}, maxRotation:45 }, grid:{ color:'rgba(255,255,255,0.04)' }},
        y: { position:'left', ticks:{ color:'#64748b', font:{size:10}, callback: v => fmt(v) }, grid:{ color:'rgba(255,255,255,0.05)' }, title:{ display:true, text:'Stock (ltr)', color:'#64748b', font:{size:10} }},
        y2: { position:'right', ticks:{ color:'#64748b', font:{size:10}, callback: v => fmt(v) }, grid:{ display:false }, title:{ display:true, text:'Purchase/Usage (ltr)', color:'#64748b', font:{size:10} }}
      }
    }
  });
}

// ============================================================
// CHART 4: AREA
// ============================================================
function renderArea() {
  const ctx = document.getElementById('chart-area').getContext('2d');
  const data = DB.aprilDailyData;
  const safetyLine = 210000;
  
  chartRefs['area'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.day),
      datasets: [
        {
