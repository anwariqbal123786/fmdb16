<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --navy: #0d1b2e;
    --navy2: #152543;
    --navy3: #1e3a5f;
    --blue: #1a56db;
    --blue-light: #3b82f6;
    --amber: #f59e0b;
    --amber-light: #fcd34d;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f97316;
    --white: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(255,255,255,0.08);
    --card: rgba(21,37,67,0.85);
    --card2: rgba(30,58,95,0.6);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--navy2), var(--navy3));
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { width: 38px; height: 38px; background: linear-gradient(135deg, var(--blue), var(--amber)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--amber); }
  .header-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .badge { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--green); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .export-btn { background: var(--blue); color: white; border: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .2s; }
  .export-btn:hover { background: var(--blue-light); transform: translateY(-1px); }

  /* FILTERS */
  .filter-bar {
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; white-space: nowrap; }
  .filter-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip {
    padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--muted); transition: all .15s;
  }
  .chip.active { background: var(--blue); color: white; border-color: var(--blue); }
  .chip:hover:not(.active) { border-color: var(--blue-light); color: var(--blue-light); }
  .filter-sep { width: 1px; height: 24px; background: var(--border); }
  .view-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .view-btn { padding: 4px 12px; font-size: 12px; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all .15s; font-family: var(--font); }
  .view-btn.active { background: var(--blue); color: white; }

  /* MAIN LAYOUT */
  .main { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent, var(--blue));
  }
  .kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 600; margin-bottom: 8px; }
  .kpi-value { font-size: 24px; font-weight: 700; letter-spacing: -1px; line-height: 1; margin-bottom: 6px; font-family: var(--mono); }
  .kpi-sub { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .kpi-arrow { font-size: 12px; }
  .kpi-arrow.up { color: var(--green); }
  .kpi-arrow.down { color: var(--red); }
  .kpi-arrow.warn { color: var(--amber); }
  .kpi-icon { position: absolute; top: 14px; right: 14px; font-size: 22px; opacity: .25; }

  /* STATUS COLORS */
  .status-green { color: var(--green) !important; --accent: var(--green); }
  .status-amber { color: var(--amber) !important; --accent: var(--amber); }
  .status-red { color: var(--red) !important; --accent: var(--red); }
  .status-blue { color: var(--blue-light) !important; --accent: var(--blue); }

  /* SECTION TITLES */
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* CHART GRID */
  .chart-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chart-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .chart-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
  .chart-grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
  .chart-grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 14px; }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .chart-card.span2 { grid-column: span 2; }
  .chart-card.span3 { grid-column: span 3; }
  .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .chart-caption { font-size: 11px; color: var(--amber); margin-top: 8px; font-style: italic; }
  .chart-wrap { flex: 1; position: relative; min-height: 0; }
  .chart-export { position: absolute; top: 12px; right: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); padding: 3px 8px; border-radius: 5px; font-size: 10px; cursor: pointer; }
  .chart-export:hover { color: white; }

  /* HEATMAP */
  .heatmap-grid { display: grid; gap: 3px; overflow-x: auto; }
  .heatmap-row { display: flex; gap: 3px; align-items: center; }
  .heatmap-label { font-size: 10px; color: var(--muted); width: 80px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .heatmap-cell { width: 38px; height: 24px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; cursor: pointer; transition: transform .1s; flex-shrink: 0; }
  .heatmap-cell:hover { transform: scale(1.15); z-index: 2; }
  .heatmap-header { display: flex; gap: 3px; margin-bottom: 3px; margin-left: 83px; }
  .heatmap-header span { width: 38px; font-size: 9px; color: var(--muted); text-align: center; flex-shrink: 0; }

  /* CALENDAR HEATMAP */
  .cal-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 3px; }
  .cal-cell { height: 30px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform .1s; position: relative; }
  .cal-cell:hover { transform: scale(1.1); z-index: 2; }
  .cal-day { font-size: 8px; color: rgba(255,255,255,0.5); }
  .cal-val { font-size: 9px; font-weight: 700; }

  /* WATERFALL */
  .waterfall-wrap { overflow-x: auto; }

  /* TABLE */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { background: rgba(255,255,255,0.05); color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; padding: 8px 10px; text-align: right; font-weight: 600; border-bottom: 1px solid var(--border); }
  .data-table th:first-child, .data-table th:nth-child(2) { text-align: left; }
  .data-table td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); text-align: right; }
  .data-table td:first-child, .data-table td:nth-child(2) { text-align: left; }
  .data-table tr:hover td { background: rgba(255,255,255,0.03); }
  .rag-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .rag-green { background: rgba(16,185,129,0.2); color: var(--green); }
  .rag-amber { background: rgba(245,158,11,0.2); color: var(--amber); }
  .rag-red { background: rgba(239,68,68,0.2); color: var(--red); }
  .rio-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-right: 4px; }
  .r1 { background: rgba(59,130,246,0.2); color: #93c5fd; }
  .r2 { background: rgba(167,139,250,0.2); color: #c4b5fd; }
  .r3 { background: rgba(52,211,153,0.2); color: #6ee7b7; }
  .r4 { background: rgba(251,191,36,0.2); color: var(--amber-light); }

  /* GAUGE */
  .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .gauge-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
  .gauge-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .gauge-name { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
  .gauge-bar-track { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin: 6px 0; }
  .gauge-bar-fill { height: 100%; border-radius: 5px; transition: width .8s; }
  .gauge-pct { font-size: 22px; font-weight: 800; font-family: var(--mono); margin: 4px 0; }
  .gauge-sub { font-size: 10px; color: var(--muted); }

  /* FORWARD PLANNING */
  .alert-list { display: flex; flex-direction: column; gap: 6px; }
  .alert-item { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .alert-item.warn { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.2); }
  .alert-icon { font-size: 16px; flex-shrink: 0; }
  .alert-text { flex: 1; }
  .alert-text strong { display: block; font-size: 12px; font-weight: 700; }
  .alert-text span { font-size: 11px; color: var(--muted); }
  .alert-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }

  /* AI PANEL */
  .ai-panel { background: linear-gradient(135deg, rgba(26,86,219,0.1), rgba(30,58,95,0.3)); border: 1px solid rgba(26,86,219,0.3); border-radius: 12px; padding: 20px; }
  .ai-panel-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .ai-insights { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ai-insight { display: flex; gap: 10px; align-items: flex-start; padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border); }
  .ai-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .ai-text { font-size: 12px; line-height: 1.6; color: #cbd5e1; }
  .health-score { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .health-num { font-size: 48px; font-weight: 800; font-family: var(--mono); color: var(--amber); line-height: 1; }
  .health-label { font-size: 13px; font-weight: 700; }
  .health-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 1200px) { .kpi-grid { grid-template-columns: repeat(3,1fr); } .chart-grid-3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2,1fr); } .chart-grid-2 { grid-template-columns: 1fr; } .gauge-row { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .main { padding: 12px; } .filter-bar { padding: 10px 12px; } .kpi-grid { grid-template-columns: 1fr 1fr; } }

