// ============================================================
// CHART 7: STACKED BAR
// ============================================================
function renderStacked() {
  const ctx = document.getElementById('chart-stacked').getContext('2d');
  const marchP = DB.marchDailyData.reduce((s,d)=>s+d.purchase,0);
  const marchU = DB.marchDailyData.reduce((s,d)=>s+d.usage,0);
  const aprP = DB.aprilDailyData.reduce((s,d)=>s+d.purchase,0);
  const aprU = DB.aprilDailyData.reduce((s,d)=>s+d.usage,0);

  if (filters.view === 'cumulative') {
    // cumulative view
    const allData = DB.allDaily;
    let cumP = 0, cumU = 0;
    const cumPArr = [], cumUArr = [];
    allData.forEach(d => { cumP += d.purchase; cumU += d.usage; cumPArr.push(cumP); cumUArr.push(cumU); });
    
    chartRefs['stacked'] = new Chart(ctx, {
      type:'line',
      data: {
        labels: allData.map(d=>d.day),
        datasets: [
          { label:'Cumulative Purchase', data:cumPArr, borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.1)', fill:true, tension:0.3, borderWidth:2 },
          { label:'Cumulative Usage', data:cumUArr, borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,0.1)', fill:true, tension:0.3, borderWidth:2 }
        ]
      },
      options: chartOpts('Cumulative ltr')
    });
  } else {
    chartRefs['stacked'] = new Chart(ctx, {
      type:'bar',
      data: {
        labels: ['March (12–31)','April (1–16)'],
        datasets: [
          { label:'Total Purchase', data:[marchP, aprP], backgroundColor:'rgba(16,185,129,0.7)', borderRadius:5 },
          { label:'Total Usage', data:[marchU, aprU], backgroundColor:'rgba(239,68,68,0.7)', borderRadius:5 }
        ]
      },
      options: chartOpts('Litres')
    });
  }
}

// ============================================================
// CHART 8: WATERFALL
// ============================================================
function renderWaterfall() {
  const ctx = document.getElementById('chart-waterfall').getContext('2d');
  const openStock = DB.aprilDailyData[0].stock;
  const totalPurchase = DB.aprilDailyData.reduce((s,d)=>s+d.purchase,0);
  const totalUsage = DB.aprilDailyData.reduce((s,d)=>s+d.usage,0);
  const closeStock = DB.aprilDailyData[DB.aprilDailyData.length-1].stock;

  const labels = ['Opening Stock','+ Purchases','− Usage','Closing Stock'];
  const baseData = [0, openStock, openStock+totalPurchase-totalUsage, 0];
  const barData = [openStock, totalPurchase, totalUsage, closeStock];
  const colors = ['rgba(59,130,246,0.8)', 'rgba(16,185,129,0.8)', 'rgba(239,68,68,0.8)', 'rgba(251,191,36,0.8)'];

  chartRefs['waterfall'] = new Chart(ctx, {
    type:'bar',
    data: {
      labels,
      datasets: [
        { label:'Base', data:baseData, backgroundColor:'transparent', borderWidth:0 },
        { label:'Value', data:barData, backgroundColor:colors, borderRadius:4 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { display:false },
        tooltip: { callbacks: { label: (ctx) => ctx.datasetIndex===1 ? ` ${fmt(ctx.raw)} ltr` : '' }}
      },
      scales: {
        x: { stacked:true, ticks:{ color:'#94a3b8' }, grid:{ display:false }},
        y: { stacked:true, ticks:{ color:'#64748b', callback:v=>fmt(v) }, grid:{ color:'rgba(255,255,255,0.05)' }}
      }
    }
  });
}

// ============================================================
// CALENDAR HEATMAP
// ============================================================
function renderCalHeatmap() {
  const all = DB.allDaily;
  const maxP = Math.max(...all.map(d=>d.purchase));
  
  let html = '<div style="display:flex;gap:4px;align-items:flex-start;flex-wrap:wrap;">';
  html += '<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;width:100%">';
  html += '<div style="grid-column:span 10;display:flex;justify-content:space-between;font-size:9px;color:#64748b;padding-bottom:4px"><span>Mar 12</span><span>Mar 31</span><span>Apr 1</span><span>Apr 16</span></div>';
  
  all.forEach(d => {
    const intensity = maxP > 0 ? d.purchase/maxP : 0;
    const alpha = 0.1 + intensity * 0.85;
    const color = intensity > 0.7 ? `rgba(16,185,129,${alpha})` : intensity > 0.3 ? `rgba(59,130,246,${alpha})` : `rgba(30,58,95,0.5)`;
    const textColor = intensity > 0.4 ? 'white' : '#64748b';
    const isApr = d.day.includes('Apr');
    const border = isApr ? '1px solid rgba(251,191,36,0.3)' : '1px solid transparent';
    html += `<div style="height:38px;border-radius:5px;background:${color};border:${border};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative" 
              title="${d.day}: Purchase ${fmt(d.purchase)} ltr | Usage ${fmt(d.usage)} ltr">
              <span style="font-size:8px;color:rgba(255,255,255,0.5)">${d.day.replace('-26','').replace('-Apr','A').replace('-Mar','M')}</span>
              <span style="font-size:9px;font-weight:700;color:${textColor}">${d.purchase >= 1000 ? fmt(d.purchase/1000,1)+'K' : d.purchase}</span>
            </div>`;
  });
  html += '</div></div>';
  html += '<div style="display:flex;gap:12px;margin-top:8px;align-items:center;font-size:10px;color:#64748b"><span>Purchase intensity:</span>';
  ['Low','Med','High'].forEach((l,i) => {
    const c = i===0?'rgba(30,58,95,0.8)':i===1?'rgba(59,130,246,0.6)':'rgba(16,185,129,0.8)';
    html += `<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:${c};border-radius:2px;display:inline-block"></span>${l}</span>`;
  });
  html += '<span style="display:flex;align-items:center;gap:4px;margin-left:12px"><span style="width:12px;height:12px;border:1px solid rgba(251,191,36,0.5);border-radius:2px;display:inline-block"></span>April dates</span>';
  html += '</div>';
  
  document.getElementById('cal-heatmap').innerHTML = html;
}

// ============================================================
// GAUGES
// ============================================================
function renderGauges() {
  const filtered = getFilteredRIO();
  const html = Object.entries(filtered).map(([rio, data]) => {
    const pctVal = ((data.stock / data.req) * 100).toFixed(1);
    const color = pctVal >= 100 ? '#10b981' : pctVal >= 70 ? '#f59e0b' : '#ef4444';
    const barColor = pctVal >= 100 ? 'linear-gradient(90deg,#10b981,#34d399)' : pctVal >= 70 ? 'linear-gradient(90deg,#f59e0b,#fbbf24)' : 'linear-gradient(90deg,#ef4444,#f87171)';
    const status = pctVal >= 100 ? '✅ Sufficient' : pctVal >= 70 ? '⚠️ Monitor' : '🔴 Critical';
    return `
      <div class="gauge-card">
        <div class="gauge-name">${rio}</div>
        <div class="gauge-pct" style="color:${color}">${pctVal}%</div>
        <div class="gauge-bar-track"><div class="gauge-bar-fill" style="width:${Math.min(pctVal,100)}%;background:${barColor}"></div></div>
        <div class="gauge-sub">${fmt(data.stock)} / ${fmt(data.req)} ltr</div>
        <div style="margin-top:8px;font-size:10px;font-weight:700;color:${color}">${status}</div>
        <div style="margin-top:6px;font-size:10px;color:#64748b">SComm: ${data.scomm_pct}% | STL: ${data.stl_pct}%</div>
      </div>
    `;
  }).join('');
  document.getElementById('gauge-row').innerHTML = html;
}

