};

function getFilteredSC() {
  return DB.scData.filter(d => filters.rios.includes(d.rio));
}

function getFilteredRIO() {
  const f = {};
  Object.entries(DB.rioData).forEach(([k,v]) => {
    if (filters.rios.includes(k)) f[k] = v;
  });
  return f;
}

function fmt(n, decimals=0) {
  if (n === undefined || n === null) return '—';
  return Number(n).toLocaleString('en', { maximumFractionDigits: decimals });
}

function pct(a, b) { return b ? ((a/b)*100).toFixed(1) : '0.0'; }
