// ============================================================
// PLANNING TABLE
// ============================================================
function renderPlanningTable() {
  const tbody = document.getElementById('planning-tbody');
  const rioClass = {RIO1:'r1',RIO2:'r2',RIO3:'r3',RIO4:'r4'};
  
  const rows = getFilteredSC().map(d => {
    const totalNeed = d.apr_req + d.may_req + d.jun_req;
    const gap = d.stock - totalNeed;
    const covPct = totalNeed > 0 ? ((d.stock/totalNeed)*100).toFixed(1) : '0.0';
    const status = parseFloat(covPct) >= 100 ? 'Safe' : parseFloat(covPct) >= 60 ? 'At Risk' : 'Critical';
    const ragClass = status === 'Safe' ? 'rag-green' : status === 'At Risk' ? 'rag-amber' : 'rag-red';
    const dailyRate = d.usage > 0 ? d.usage : 1;
    const daysLeft = (d.stock / dailyRate).toFixed(0);
    
    return `
      <tr>
        <td><span class="rio-tag ${rioClass[d.rio]}">${d.rio}</span></td>
        <td style="font-weight:600">${d.sc}</td>
        <td style="color:#64748b;font-size:11px">${d.dgpg_qty} units</td>
        <td style="font-weight:600">${fmt(d.stock)}</td>
        <td>${fmt(d.apr_req)}</td>
        <td>${fmt(d.may_req)}</td>
        <td>${fmt(d.jun_req)}</td>
        <td style="font-weight:600">${fmt(totalNeed)}</td>
        <td style="color:${gap>=0?'#10b981':'#ef4444'};font-weight:600">${gap>=0?'+':''}${fmt(gap)}</td>
        <td style="font-weight:600;color:${parseFloat(covPct)>=100?'#10b981':parseFloat(covPct)>=60?'#f59e0b':'#ef4444'}">${covPct}%</td>
        <td><span class="rag-badge ${ragClass}">${status}</span></td>
      </tr>
    `;
  });
  
  tbody.innerHTML = rows.join('');
}

// ============================================================
// ALERTS
// ============================================================
function renderAlerts() {
  const scs = getFilteredSC();
  const alerts = [];
  
  scs.forEach(d => {
    const totalNeed = d.apr_req + d.may_req + d.jun_req;
    const covPct = totalNeed > 0 ? (d.stock/totalNeed)*100 : 0;
    const dailyRate = Math.max(d.usage, 1);
    const daysLeft = d.stock / dailyRate;
    
    if (covPct < 30) {
      alerts.push({ sc:d.sc, rio:d.rio, type:'critical', msg:`Only ${covPct.toFixed(0)}% of Apr–Jun requirement covered. Stock may run out in ~${daysLeft.toFixed(0)} days at current rate.`, label:'🔴 CRITICAL' });
    } else if (daysLeft < 30 || covPct < 70) {
      alerts.push({ sc:d.sc, rio:d.rio, type:'warn', msg:`${covPct.toFixed(0)}% requirement covered. Estimated ${daysLeft.toFixed(0)} days of stock remaining.`, label:'⚠️ AT RISK' });
    }
  });
  
  const rioClass = {RIO1:'r1',RIO2:'r2',RIO3:'r3',RIO4:'r4'};
  const html = alerts.slice(0, 12).map(a => `
    <div class="alert-item ${a.type==='warn'?'warn':''}">
      <div class="alert-icon">${a.type==='critical'?'🚨':'⚠️'}</div>
      <div class="alert-text">
        <strong><span class="rio-tag ${rioClass[a.rio]}">${a.rio}</span>${a.sc}</strong>
        <span>${a.msg}</span>
      </div>
      <div class="alert-badge" style="background:${a.type==='critical'?'rgba(239,68,68,0.2)':'rgba(245,158,11,0.2)'};color:${a.type==='critical'?'#ef4444':'#f59e0b'}">${a.label}</div>
    </div>
  `).join('') || '<div style="color:#64748b;font-size:12px;padding:12px">✅ No critical alerts for selected filters.</div>';
  
  document.getElementById('alert-list').innerHTML = html;
}

