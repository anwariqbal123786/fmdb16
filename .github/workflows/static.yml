// ============================================================
// CHART OPTIONS HELPER
// ============================================================
function chartOpts(yLabel) {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode:'index', intersect:false },
    plugins: {
      legend: { labels: { color:'#94a3b8', font:{size:11}, usePointStyle:true, pointStyleWidth:8 }},
      tooltip: { backgroundColor:'rgba(13,27,46,0.95)', titleColor:'#f8fafc', bodyColor:'#94a3b8', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.raw)}` } }
    },
    scales: {
      x: { ticks:{ color:'#64748b', font:{size:10} }, grid:{ color:'rgba(255,255,255,0.04)' }},
      y: { ticks:{ color:'#64748b', font:{size:10}, callback: v => typeof v === 'number' && Math.abs(v) >= 1000 ? fmt(v) : v }, grid:{ color:'rgba(255,255,255,0.05)' }, title:{ display: !!yLabel, text:yLabel, color:'#64748b', font:{size:10} }}
    }
  };
}

