// ============================================================
// HEATMAP (Usage by SC × Week)
// ============================================================
function renderHeatmap() {
  const scs = getFilteredSC();
  const periods = ['1–7 Apr','8–12 Apr','13–16 Apr','March'];
  
  // Approximate usage per period per SC from daily data
  const scUsage = {};
  DB.scData.forEach(d => {
    if (!filters.rios.includes(d.rio)) return;
    scUsage[d.sc] = [
      Math.round(d.usage * 7 * 0.6),   // wk1 approx
      Math.round(d.usage * 5 * 0.5),   // wk2 approx
      Math.round(d.usage * 4 * 0.4),   // wk3 approx
      Math.round(d.usage * 8)            // march approx
    ];
  });
  
  const maxVal = Math.max(...Object.values(scUsage).flat());
  
  let html = `<div class="heatmap-header">${periods.map(p=>`<span>${p}</span>`).join('')}</div>`;
  
  Object.entries(scUsage).forEach(([sc, vals]) => {
    const sc_obj = DB.scData.find(d=>d.sc===sc);
    const rioTag = sc_obj ? `<span class="rio-tag r${sc_obj.rio.slice(-1)}">${sc_obj.rio}</span>` : '';
    html += `<div class="heatmap-row">${rioTag}<div class="heatmap-label" title="${sc}">${sc}</div>`;
    vals.forEach((v, i) => {
      const intensity = maxVal > 0 ? v/maxVal : 0;
      const alpha = 0.15 + intensity * 0.75;
      const color = intensity > 0.7 ? `rgba(239,68,68,${alpha})` : intensity > 0.4 ? `rgba(245,158,11,${alpha})` : `rgba(59,130,246,${alpha})`;
      const textColor = intensity > 0.5 ? 'white' : '#94a3b8';
      html += `<div class="heatmap-cell" style="background:${color};color:${textColor}" title="${sc} / ${periods[i]}: ${fmt(v)} ltr">${v > 999 ? fmt(v/1000,1)+'K' : v}</div>`;
    });
    html += `</div>`;
  });
  
  document.getElementById('heatmap-container').innerHTML = `<div class="heatmap-grid">${html}</div>`;
}

